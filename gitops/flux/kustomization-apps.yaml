---
# Flux Kustomization that reconciles everything in gitops/flux/apps/.
# Lives here (gitops/flux/) rather than inside apps/ so kustomize does not
# mistake it for a kustomize.config.k8s.io Kustomization when building apps/.
#
# dependsOn is intentional:
#   Kyverno must be healthy before space-taco pods are admitted, otherwise the
#   image-signature ValidatingWebhookConfiguration blocks the first pod start.
#
#   Istio is the AKS-managed service mesh add-on (service_mesh_profile in
#   gitops/terraform/infra/aks.tf), not a Flux-managed HelmRelease, so there's
#   no Istio healthCheck here — Terraform provisions it (and the CNI chaining
#   mode, via istio.tf) before flux_bootstrap_git ever runs, so it's already
#   live by the time this Kustomization reconciles.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m

  # Path inside the repo that Flux watches for changes.
  path: ./gitops/flux/apps

  # The GitRepository source created by flux_bootstrap_git (flux-system/flux-system).
  sourceRef:
    kind: GitRepository
    name: flux-system

  prune: true   # Delete resources removed from Git (keeps cluster in sync).
  wait: true    # Wait for all resources in this Kustomization to become Ready
                # before marking the Kustomization itself as Ready.

  # Ordering: Kyverno before space-taco so the admission webhook is live first.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kyverno
      namespace: kyverno
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: space-taco
      namespace: space-taco
