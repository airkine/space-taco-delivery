---
# Kyverno HelmRepository — fetches from the official Kyverno chart repo.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kyverno
  namespace: flux-system
spec:
  url: https://kyverno.github.io/kyverno/
  interval: 60m # Policy engine charts don't change often; relax polling interval.
---
# Kyverno HelmRelease — installs the Kyverno admission controller.
# Must be applied (and healthy) before the space-taco HelmRelease, since
# Kyverno's ValidatingWebhookConfiguration will reject pods that don't pass
# the image-signature policy once it is installed.
#
# standalone mode (replicaCount: 1) is sufficient for a single-node dev cluster.
# Production would use replicaCount: 3 + HA mode.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 10m

  chart:
    spec:
      chart: kyverno
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system

  install:
    createNamespace: true # Creates the kyverno namespace if it doesn't exist.
    remediation:
      # retries goes under remediation in Flux v2 HelmRelease schema;
      # placing it directly under install/upgrade is a schema validation error.
      retries: 3

  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true

  values:
    # Single replica — dev cluster, no HA needed.
    # nodeSelector removed: the "apps" user node pool does not exist in the
    # current cluster (only system pool is provisioned), so locking pods to
    # kubernetes.azure.com/mode=user prevents scheduling entirely.
    #
    # Resource *requests* below are trimmed well under the chart defaults
    # (admissionController: initContainer 10m/64Mi + container 100m/128Mi;
    # background/cleanup/reportsController: 100m/64Mi each — ~410m CPU /
    # 384Mi memory total). On this dev cluster's small Standard_B2pls_v2
    # nodes (2 vCPU/4 GiB, most of it already claimed by istiod, Flux's
    # controllers, and per-node AKS/Istio daemonsets), those defaults left
    # kyverno-reports-controller permanently stuck FailedScheduling even
    # after growing the apps node pool to 3 nodes — see
    # ../../terraform/README.md's AKS troubleshooting table. Limits are
    # left at chart defaults: this only lowers what the scheduler reserves
    # up front, not the ceiling each container can actually use.
    admissionController:
      replicas: 1
      initContainer:
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
      container:
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
    backgroundController:
      replicas: 1
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
    reportsController:
      replicas: 1
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
