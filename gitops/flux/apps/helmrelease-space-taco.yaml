---
# HelmRelease tells Flux to deploy the space-taco Helm chart into the space-taco
# namespace and keep it reconciled.  Any drift from the desired state is corrected
# automatically on the next reconciliation interval.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: space-taco
  namespace: space-taco
spec:
  # How often Flux reconciles the release even when nothing has changed.
  interval: 10m

  # space-taco's Helm chart installs Kyverno ClusterPolicy resources.
  # If helm-controller tries to apply them before Kyverno registers its CRDs,
  # the install times out with ClusterPolicy status: 'NotFound'.
  # dependsOn ensures helm-controller waits for kyverno to be fully ready first.
  #
  # No Istio dependsOn here: Istio is the AKS-managed service mesh add-on
  # (service_mesh_profile + the CNI-chaining null_resource in
  # gitops/terraform/infra), provisioned by Terraform before
  # flux_bootstrap_git ever runs — by the time this HelmRelease reconciles,
  # the add-on (and its CNI DaemonSet) is already live.
  dependsOn:
    - name: kyverno
      namespace: kyverno

  chart:
    spec:
      # Must match the chart name inside the OCI artifact (helm show chart oci://...).
      chart: space-taco
      # semver range: ">=0.1.1" requires the version that removed the hardcoded nodeSelector.
      version: ">=0.1.1"
      sourceRef:
        kind: HelmRepository
        name: space-taco-ghcr
        namespace: flux-system
      # Re-resolve the chart on every reconciliation so new pushes are picked up
      # without needing a manual flux reconcile helmrelease.
      reconcileStrategy: ChartVersion

  # Upgrade behaviour — retry up to 3 times, then wait for the next interval.
  # retries lives under remediation in the Flux v2 HelmRelease schema; it is
  # invalid (schema validation error) at the top level of install/upgrade.
  upgrade:
    # Roll back to the previous release if the upgrade fails all retries.
    remediation:
      retries: 3
      remediateLastFailure: true

  # If the initial install fails, retry before giving up.
  install:
    remediation:
      retries: 3

  # ---------------------------------------------------------------------------
  # Values — override chart defaults for the dev Azure cluster.
  # The app uses in-memory store (no Redis) to keep costs at zero.
  # ---------------------------------------------------------------------------
  values:
    # Single replica for dev — saves node resources for Flux/Kyverno overhead.
    replicaCount: 1

    image:
      registry: ghcr.io
      # Must match the IMAGE_NAME in build.yml: <owner>/<repo>/space-taco-delivery
      repository: airkine/space-taco-delivery/space-taco-delivery
      # Always pull so that a new "latest" image pushed by CI is picked up
      # immediately on the next pod restart/upgrade without needing to change the tag.
      pullPolicy: Always
      # "latest" tracks the most recent push to main.  Pin to a semver tag
      # (e.g. "v0.2.1") for a stable deploy that only updates on explicit change.
      tag: "latest"

    # No Redis in dev Azure — app falls back to the in-memory store gracefully.
    # Add `REDIS_URL: "redis://redis:6379/0"` here if you add a Redis HelmRelease.
    env:
      PORT: "8080"
      REDIS_URL: ""

    # Keep resources tight — B2s has 2 vCPU / 4Gi shared with Flux + Kyverno.
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi

    service:
      type: ClusterIP
      port: 80
      targetPort: 8080

    # Public ingress via AKS Web App Routing (managed NGINX).
    # The controller automatically creates an A record in autoaaron.xyz pointing
    # at the provisioned public IP, so the app is reachable at the host below
    # within ~60 seconds of the Ingress being admitted.
    ingress:
      enabled: true
      className: "webapprouting.kubernetes.azure.com"
      annotations: {}
      hosts:
        - host: "taco-delivery.autoaaron.xyz"
          paths:
            - path: /
              pathType: Prefix
      tls: []

    # No anti-affinity needed for a single-replica dev deploy.
    affinity: {}

    # Istio + blue/green — additive to the Web App Routing Ingress above, not
    # a replacement for it. The Ingress keeps serving traffic at
    # taco-delivery.autoaaron.xyz exactly as before; this adds a *second*,
    # mesh-aware entry point (the AKS-managed Istio external ingress
    # gateway's LoadBalancer Service) to practice blue/green cutovers
    # against, since plain Ingress->Service traffic bypasses Istio's
    # VirtualService weighting entirely.
    istio:
      enabled: true
      gateway:
        # Pod label on the AKS add-on's external ingress gateway deployment
        # (not the chart's "istio: ingressgateway" default, which matches a
        # self-managed upstream Istio install like the one used in Kind).
        selector:
          istio: aks-istio-ingressgateway-external
        hosts:
          - "taco-delivery.autoaaron.xyz"

    blueGreen:
      enabled: true
      activeSlot: blue
      slots:
        blue:
          replicaCount: 1
        green:
          replicaCount: 1
