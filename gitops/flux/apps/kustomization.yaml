---
# This Kustomization tells Flux to apply everything in the apps/ directory.
# Flux's bootstrap Kustomization (in flux-system/) points at gitops/flux/ and
# will discover this file, which in turn pulls in all the HelmRelease/HelmRepository
# manifests in this directory.
#
# dependsOn is intentional:
#   Kyverno must be healthy before space-taco pods are admitted, otherwise the
#   image-signature ValidatingWebhookConfiguration blocks the first pod start.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m

  # Path inside the repo that Flux watches for changes.
  path: ./gitops/flux/apps

  # The GitRepository source created by flux_bootstrap_git (flux-system/flux-system).
  sourceRef:
    kind: GitRepository
    name: flux-system

  # Apply the namespace manifest before everything else so the space-taco
  # namespace exists before Kyverno tries to webhook into it.
  prune: true   # Delete resources removed from Git (keeps cluster in sync).
  wait: true    # Wait for all resources in this Kustomization to become Ready
                # before marking the Kustomization itself as Ready.

  # Ordering: Kyverno before space-taco so the admission webhook is live first.
  # Flux evaluates healthChecks in order; once kyverno HelmRelease is Ready,
  # space-taco is allowed to proceed.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kyverno
      namespace: kyverno
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: space-taco
      namespace: space-taco
