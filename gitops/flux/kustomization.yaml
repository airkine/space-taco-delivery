---
# Root kustomize config for the path Flux watches (./gitops/flux).
# Without this file, kustomize-controller auto-generates one by scanning
# all subdirectories recursively — which would include apps/ (and
# cert-manager/, cert-manager-issuers/) as direct resources AND apply their
# kustomization-*.yaml Flux Kustomizations, causing double-management and
# leaking their healthChecks into the flux-system status.
#
# By being explicit we control exactly what the flux-system Kustomization
# deploys:
#   - flux-system/ installs Flux controllers and wires up the GitRepository
#     + Kustomization that points back here.
#   - kustomization-apps.yaml creates the "apps" child Kustomization, which
#     separately reconciles ./gitops/flux/apps at its own interval.
#   - kustomization-cert-manager.yaml / kustomization-cert-manager-issuers.yaml
#     create two more child Kustomizations for TLS (cert-manager itself, then
#     the ClusterIssuer/Certificate objects that depend on its CRDs) — split
#     from "apps" and from each other for the dependency-ordering reasons
#     explained in each of those files.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system/  # Flux controllers (gotk-components) + sync config (gotk-sync)
  - kustomization-apps.yaml  # Child Flux Kustomization that manages ./gitops/flux/apps
  - kustomization-cert-manager.yaml  # Child Flux Kustomization that manages ./gitops/flux/cert-manager
  - kustomization-cert-manager-issuers.yaml  # Child Flux Kustomization that manages ./gitops/flux/cert-manager-issuers
