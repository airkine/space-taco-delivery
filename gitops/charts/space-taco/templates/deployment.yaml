{{- if .Values.blueGreen.enabled }}
{{/*
Blue/green mode: render one Deployment per slot. Both slots run at full
replica count at all times — the idle slot is a hot standby, not scaled to
zero — so a cutover via blueGreen.activeSlot is instant with no cold start.
Traffic split between them is enforced by the Istio VirtualService/
DestinationRule (see istio-virtualservice.yaml / istio-destinationrule.yaml),
not by this template.
*/}}
{{- include "space-taco.deployment" (dict "root" $ "slotName" "blue" "slotConfig" .Values.blueGreen.slots.blue) }}
---
{{- include "space-taco.deployment" (dict "root" $ "slotName" "green" "slotConfig" .Values.blueGreen.slots.green) }}
{{- else }}
{{- include "space-taco.deployment" (dict "root" $ "slotName" "" "slotConfig" dict) }}
{{- end }}
