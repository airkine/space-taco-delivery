# Default values for space-taco.
# These are overridden per environment via values-<env>.yaml

replicaCount: 2

image:
  registry: ghcr.io
  repository: your-org/space-taco-delivery/space-taco-delivery
  pullPolicy: IfNotPresent
  # Updated by the CI pipeline on each push to main
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations:
  # Kyverno will verify this image is signed before admitting
  policy.sigstore.dev/include: "true"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: space-taco.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# No nodeSelector by default — schedule on any available node.
# Override per environment if a dedicated user node pool is provisioned.
# Example: nodeSelector: {kubernetes.azure.com/mode: user}
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - space-taco
          topologyKey: kubernetes.io/hostname

env:
  PORT: "8080"
  # Set to a Redis URL (e.g. redis://redis:6379/0) to enable order caching.
  # Leave empty to use the in-memory store only.
  REDIS_URL: ""

# Kyverno image verification — populated by cluster policy
imageVerification:
  enabled: true
  rekorURL: "https://rekor.sigstore.dev"
