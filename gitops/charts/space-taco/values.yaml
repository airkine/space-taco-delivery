# Default values for space-taco.
# These are overridden per environment via values-<env>.yaml

replicaCount: 2

image:
  registry: ghcr.io
  repository: your-org/space-taco-delivery/space-taco-delivery
  pullPolicy: IfNotPresent
  # Updated by the CI pipeline on each push to main
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations:
  # Kyverno will verify this image is signed before admitting
  policy.sigstore.dev/include: "true"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: space-taco.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# No nodeSelector by default — schedule on any available node.
# Override per environment if a dedicated user node pool is provisioned.
# Example: nodeSelector: {kubernetes.azure.com/mode: user}
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - space-taco
          topologyKey: kubernetes.io/hostname

env:
  PORT: "8080"
  # Set to a Redis URL (e.g. redis://redis:6379/0) to enable order caching.
  # Leave empty to use the in-memory store only.
  REDIS_URL: ""

# Kyverno image verification — populated by cluster policy
imageVerification:
  enabled: true
  rekorURL: "https://rekor.sigstore.dev"

# Istio service mesh integration. Disabled by default so existing consumers of
# this chart (and the plain Ingress path) are unaffected until they opt in.
istio:
  enabled: false
  gateway:
    # Label selector matching the Istio ingress gateway pods (the default
    # label applied by the `istio/gateway` Helm chart's "ingress" preset).
    selector:
      istio: ingressgateway
    # Hostnames the Gateway/VirtualService will accept traffic for.
    # Override per environment: "space-taco.local" for Kind,
    # "taco-delivery.autoaaron.xyz" for AKS.
    hosts:
      - space-taco.local

# Blue/green deployment. When enabled, the chart renders two Deployments
# ("blue" and "green") instead of one, both selected by the same Service, with
# an Istio VirtualService/DestinationRule sending 100% of traffic to
# activeSlot and 0% to the other. Both slots run at full replica count at all
# times so the idle slot is a hot standby ready for an instant cutover —
# switch traffic with: helm upgrade --set blueGreen.activeSlot=green
# Requires istio.enabled: true (traffic weighting only works for requests
# entering through an Istio Gateway; plain Ingress->Service traffic is
# resolved by kube-proxy before Envoy ever sees it).
blueGreen:
  enabled: false
  activeSlot: blue
  slots:
    blue:
      replicaCount: 2
      image:
        # Empty tag means "inherit .Values.image.tag" — set this explicitly
        # to roll out a different version to this slot only.
        tag: ""
    green:
      replicaCount: 2
      image:
        tag: ""
