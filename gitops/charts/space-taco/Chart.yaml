apiVersion: v2
name: space-taco
description: 🌮🚀 Intergalactic Taco Delivery Microservice
type: application
version: 0.3.0
appVersion: "0.1.1"

keywords:
  - taco
  - microservice
  - gitops

maintainers:
  - name: your-org
    email: platform@your-org.com

annotations:
  artifacthub.io/changes: |
    - kind: added
      description: Initial intergalactic launch
    - kind: fixed
      description: Remove hardcoded nodeSelector from chart defaults so pods schedule on any available node
    - kind: added
      description: >-
        Istio Gateway/VirtualService/DestinationRule support (istio.enabled)
        and blue/green Deployment slots (blueGreen.enabled) switched via
        blueGreen.activeSlot. Both disabled by default; no change to existing
        single-Deployment behavior.
    - kind: added
      description: >-
        TLS termination on the Istio Gateway (istio.tls.enabled +
        istio.tls.credentialName), adding an HTTPS (443) server alongside
        the existing HTTP (80) one. Disabled by default; no change to
        existing behavior. The Ingress template already supported
        spec.tls generically, so no chart change was needed for the Web App
        Routing path's TLS — see gitops/flux/cert-manager-issuers/ for the
        cert-manager wiring that populates both.
