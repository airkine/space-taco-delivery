services:
  space-taco:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: final
      args:
        VERSION: dev
        COMMIT: local
    image: space-taco-delivery:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
