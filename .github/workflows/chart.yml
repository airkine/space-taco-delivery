name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "gitops/charts/**"
      - ".github/workflows/chart.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_PATH: gitops/charts/space-taco

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Template chart (dry run)
        run: |
          helm template space-taco ${{ env.CHART_PATH }} \
            --set image.tag=dry-run \
            --debug > /dev/null

  publish:
    name: Publish to GHCR OCI
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Package chart
        id: package
        run: |
          helm package ${{ env.CHART_PATH }} --destination /tmp/charts
          CHART_PKG=$(ls /tmp/charts/*.tgz)
          echo "chart_pkg=${CHART_PKG}" >> $GITHUB_OUTPUT

      - name: Push chart to GHCR OCI
        id: push
        run: |
          CHART_VERSION=$(helm show chart ${{ env.CHART_PATH }} | grep '^version:' | awk '{print $2}')
          helm push ${{ steps.package.outputs.chart_pkg }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts

          echo "chart_version=${CHART_VERSION}" >> $GITHUB_OUTPUT

      - name: Sign the chart (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts/space-taco:${{ steps.push.outputs.chart_version }}
