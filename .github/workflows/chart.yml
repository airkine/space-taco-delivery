name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "gitops/charts/**"
      - ".github/workflows/chart.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_PATH: gitops/charts/space-taco

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # Pinned, not "latest" — see the publish job's "Set up Helm" step
          # for why letting this float is what broke chart publishing.
          version: "v3.18.6"

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Template chart (dry run)
        run: |
          helm template space-taco ${{ env.CHART_PATH }} \
            --set image.tag=dry-run \
            --debug > /dev/null

  publish:
    name: Publish to GHCR OCI
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # Pinned, NOT "latest". azure/setup-helm@v4's unpinned default
          # silently installed Helm v4.2.2 here, and `helm push` to GHCR
          # under Helm v4 fails with a registry-specific bug: it POSTs to
          # ghcr.io's token endpoint with the wrong content-type and gets
          # rejected with "405: unsupported: The operation is unsupported"
          # (helm/helm#31223 — Docker Hub pushes are unaffected, only GHCR).
          # That 405 was never visible in this workflow's own logs because
          # of the now-fixed `set -e` bug below — it just looked like a
          # bare "exit code 1". v3.18.6 is the last release confirmed
          # unaffected; there is nothing v4-specific that this workflow
          # needs, so pin here rather than chase v4 patch releases.
          version: "v3.18.6"

      # docker/login-action writes credentials to ~/.docker/config.json, which is
      # the shared credential store used by both Helm (OCI) and Cosign. Using
      # helm registry login alone is insufficient because Cosign cannot read
      # Helm's separate credential store and will fail to push signatures.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Package chart
        id: package
        run: |
          helm package ${{ env.CHART_PATH }} --destination /tmp/charts
          CHART_PKG=$(ls /tmp/charts/*.tgz)
          echo "chart_pkg=${CHART_PKG}" >> $GITHUB_OUTPUT

      - name: Push chart to GHCR OCI
        id: push
        run: |
          CHART_VERSION=$(helm show chart ${{ env.CHART_PATH }} | grep '^version:' | awk '{print $2}')

          # Capture full push output so we can parse the immutable digest —
          # helm push prints two lines: "Pushed: <ref>" and "Digest: sha256:<hash>".
          #
          # set +e/-e around the call (and checking $? explicitly) is
          # deliberate, not optional: this script runs with `bash -e`, and
          # `PUSH_OUTPUT=$(helm push ... 2>&1)` propagates helm's exit code to
          # the assignment itself. Under -e that aborts the script on the
          # very next line — before "echo ${PUSH_OUTPUT}" ever runs — so a
          # failure prints NOTHING but "Process completed with exit code 1"
          # and the actual error (e.g. the GHCR-specific Helm v4 bug this
          # job's "Set up Helm" step is now pinned against) is silently
          # discarded. That exact blind failure is what happened here.
          set +e
          PUSH_OUTPUT=$(helm push ${{ steps.package.outputs.chart_pkg }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts 2>&1)
          PUSH_STATUS=$?
          set -e
          echo "${PUSH_OUTPUT}"
          if [ ${PUSH_STATUS} -ne 0 ]; then
            echo "::error::helm push failed (exit ${PUSH_STATUS}) — see output above"
            exit ${PUSH_STATUS}
          fi

          # Extract the digest — we sign by digest, not by mutable tag, so the signature
          # stays valid even if the tag is later repointed.
          CHART_DIGEST=$(echo "${PUSH_OUTPUT}" | grep -oP 'Digest: \K\S+')

          echo "chart_version=${CHART_VERSION}" >> $GITHUB_OUTPUT
          echo "chart_digest=${CHART_DIGEST}" >> $GITHUB_OUTPUT

      # Sign by immutable digest, not mutable tag.
      # COSIGN_EXPERIMENTAL is no longer needed in Cosign v2+; keyless is the default.
      - name: Sign the chart (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts/space-taco@${{ steps.push.outputs.chart_digest }}

      # Generate an SBOM for the Helm chart package (.tgz) using Syft.
      # This gives consumers a verifiable bill of materials for the chart itself.
      #
      # NOTE: anchore/sbom-action@v0 passes the 'path' parameter to syft with a
      # 'dir:' scheme prefix (e.g. 'syft scan dir:/tmp/charts/space-taco-0.1.1.tgz'),
      # which fails because a .tgz archive is not a directory.  The action only
      # supports directories and OCI images via 'path:'.  We install syft directly
      # and invoke it without the 'dir:' scheme — syft auto-detects .tgz archives
      # and walks their contents correctly.
      - name: Generate chart SBOM
        run: |
          # Install the latest stable Syft release into /usr/local/bin.
          # Using the official installer script so the version stays up to date
          # without manual maintenance of a pinned version string in this file.
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

          # Scan the packaged .tgz — syft detects the archive format automatically
          # when no scheme prefix is specified, enumerating every file inside it.
          syft scan "${{ steps.package.outputs.chart_pkg }}" \
            -o spdx-json \
            --file chart-sbom.spdx.json

      # Upload the generated SBOM as a workflow artifact so it can be downloaded
      # and inspected, and so 'Attest chart SBOM' can reference it.
      - name: Upload chart SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart-sbom
          path: chart-sbom.spdx.json
          retention-days: 30

      # Attest the SBOM against the chart's immutable digest so it is verifiable
      # via `cosign verify-attestation` and recorded in Rekor.
      - name: Attest chart SBOM
        run: |
          cosign attest --yes \
            --predicate chart-sbom.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts/space-taco@${{ steps.push.outputs.chart_digest }}
