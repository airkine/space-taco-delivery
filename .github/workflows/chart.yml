name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "gitops/charts/**"
      - ".github/workflows/chart.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_PATH: gitops/charts/space-taco

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Template chart (dry run)
        run: |
          helm template space-taco ${{ env.CHART_PATH }} \
            --set image.tag=dry-run \
            --debug > /dev/null

  publish:
    name: Publish to GHCR OCI
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Package chart
        id: package
        run: |
          helm package ${{ env.CHART_PATH }} --destination /tmp/charts
          CHART_PKG=$(ls /tmp/charts/*.tgz)
          echo "chart_pkg=${CHART_PKG}" >> $GITHUB_OUTPUT

      - name: Push chart to GHCR OCI
        id: push
        run: |
          CHART_VERSION=$(helm show chart ${{ env.CHART_PATH }} | grep '^version:' | awk '{print $2}')

          # Capture full push output so we can parse the immutable digest.
          # helm push prints two lines: "Pushed: <ref>" and "Digest: sha256:<hash>"
          PUSH_OUTPUT=$(helm push ${{ steps.package.outputs.chart_pkg }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts 2>&1)
          echo "${PUSH_OUTPUT}"

          # Extract the digest — we sign by digest, not by mutable tag, so the signature
          # stays valid even if the tag is later repointed.
          CHART_DIGEST=$(echo "${PUSH_OUTPUT}" | grep -oP 'Digest: \K\S+')

          echo "chart_version=${CHART_VERSION}" >> $GITHUB_OUTPUT
          echo "chart_digest=${CHART_DIGEST}" >> $GITHUB_OUTPUT

      # Sign by immutable digest, not mutable tag.
      # COSIGN_EXPERIMENTAL is no longer needed in Cosign v2+; keyless is the default.
      - name: Sign the chart (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts/space-taco@${{ steps.push.outputs.chart_digest }}

      # Generate an SBOM for the Helm chart package (.tgz) using Syft.
      # This gives consumers a verifiable bill of materials for the chart itself.
      - name: Generate chart SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.package.outputs.chart_pkg }}
          format: spdx-json
          output-file: chart-sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      # Attest the SBOM against the chart's immutable digest so it is verifiable
      # via `cosign verify-attestation` and recorded in Rekor.
      - name: Attest chart SBOM
        run: |
          cosign attest --yes \
            --predicate chart-sbom.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/space-taco-delivery/charts/space-taco@${{ steps.push.outputs.chart_digest }}
