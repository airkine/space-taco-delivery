name: Terraform Destroy

# This workflow tears down ONLY the Azure/Flux infrastructure state in
# gitops/terraform/infra (AKS cluster, node pools, public IP, DNS role
# assignment, Flux bootstrap). It is intentionally manual-only — there is no
# push or pull_request trigger.
#
# IMPORTANT — scope: this workflow's working-directory is pinned to
# gitops/terraform/infra, which has its OWN Terraform state/backend key,
# entirely separate from gitops/terraform/github (repo, branch protection,
# secrets, labels, environments). That separation is deliberate: an earlier
# version of this workflow ran against the combined state and a destroy run
# deleted the GitHub repository itself along with the cluster. Terraform has
# no concept of "destroy everything except X" within a single state, so the
# only reliable guardrail is putting the repo in a state this workflow can
# never open. Do not repoint `working-directory` at gitops/terraform or at
# gitops/terraform/github.
#
# Safety gates:
#   1. Must be dispatched from the main branch (feature branches are rejected).
#   2. The 'confirm' input must contain the exact string "destroy" before any
#      infrastructure work begins.
#   3. A plan-destroy step runs first and writes its output to the job log so
#      there is a permanent audit trail of what was removed and when.
on:
  workflow_dispatch:
    inputs:
      # Require an explicit acknowledgement string so accidental clicks on
      # "Run workflow" do not silently tear down the cluster.
      confirm:
        description: "Type 'destroy' to confirm permanent deletion of the AKS/Flux infra (gitops/terraform/infra) — this does NOT touch the GitHub repo"
        type: string
        required: true

defaults:
  run:
    working-directory: gitops/terraform/infra

permissions:
  # contents:write — flux_bootstrap_git may have written manifests to main;
  # the flux provider needs push access during init even for destroy runs.
  contents: write
  # id-token:write — required for OIDC token exchange with Azure (ARM_USE_OIDC).
  id-token: write

jobs:
  destroy:
    name: Terraform Destroy (infra only)
    runs-on: ubuntu-latest
    # Mirror the environment gate used by terraform.yml so the same required
    # reviewers and secrets apply: prod for main, dev for any other branch
    # (though non-main branches are rejected by the branch-guard step below).
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      # azurerm provider + backend auth via OIDC — no long-lived client secret.
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      # -----------------------------------------------------------------------
      # Gate 1 — branch guard.
      # Destroy must always run against the canonical state on main.  Dispatching
      # from a feature branch risks destroying resources with a stale tfvars or
      # an incomplete configuration.
      # -----------------------------------------------------------------------
      - name: Verify branch is main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Terraform Destroy must be triggered from the main branch."
          echo "::error::Current ref: ${{ github.ref }}"
          echo "::error::Switch to main in the 'Use workflow from' dropdown and try again."
          exit 1

      # -----------------------------------------------------------------------
      # Gate 2 — confirmation string.
      # Checked BEFORE checkout or Azure login so no infra work happens on a
      # mistyped confirmation.
      # -----------------------------------------------------------------------
      - name: Verify confirmation text
        if: inputs.confirm != 'destroy'
        run: |
          echo "::error::Confirmation text must be exactly 'destroy' (case-sensitive)."
          echo "::error::Got: '${{ inputs.confirm }}'"
          exit 1

      # -----------------------------------------------------------------------
      # Setup — identical to terraform.yml's terraform-infra job
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          # The flux provider needs push access during init (it resolves the
          # remote to verify the bootstrap path even on destroy).
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: terraform init
        env:
          # The GitHub provider mirror is resolved during init.
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Plan destroy — runs first to produce a permanent log of what will be
      # removed.  The plan is saved to tfplan so the apply step uses the exact
      # same changeset (no drift between plan and apply). Because this job's
      # working-directory is gitops/terraform/infra, the plan can only ever
      # contain AKS/Flux resources — there is no github_repository resource in
      # this state for it to reach.
      # -----------------------------------------------------------------------
      - name: Terraform Plan Destroy
        id: plan
        run: |
          # -destroy flag produces a plan that removes all resources in state.
          # -no-color keeps the log readable without ANSI escape codes.
          # tee writes simultaneously to stdout (captured in the Actions log)
          # and to plan_output.txt for optional post-processing.
          terraform plan -destroy -no-color -out=tfplan 2>&1 | tee plan_output.txt
        env:
          # Non-sensitive config (location, environment, vm size, etc.) is
          # auto-loaded from the committed gitops/terraform/infra/terraform.tfvars.
          # Only secrets are injected here.
          TF_VAR_github_token:          ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------------
      # Destroy — applies the saved plan from the previous step.
      # Using `terraform apply tfplan` (not `terraform destroy -auto-approve`)
      # ensures the apply uses exactly the plan generated above; it cannot drift.
      # -----------------------------------------------------------------------
      - name: Terraform Destroy
        run: |
          # Apply the saved destroy plan produced in the previous step.
          # -auto-approve is safe here because the plan was already reviewed
          # and the confirmation gate already ran.
          terraform apply -auto-approve tfplan
        env:
          TF_VAR_github_token:          ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------------
      # Summary — write a notice to the job summary so it is visible in the
      # Actions UI without having to dig into the step logs.
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          echo "## Terraform Destroy — Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scope: \`gitops/terraform/infra\` only — the GitHub repository (\`gitops/terraform/github\`) is a separate state and was NOT touched." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Destroy plan output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt 2>/dev/null || echo "(plan output not available)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
