name: Terraform

# This workflow manages TWO independent Terraform states, split into FOUR
# jobs (a plan job and an apply job for each state), each with its own
# working-directory:
#   - terraform-github-plan / terraform-github-apply : gitops/terraform/github
#       (repo, branch protection, secrets, labels, environments)
#   - terraform-infra-plan  / terraform-infra-apply   : gitops/terraform/infra
#       (AKS cluster, Flux bootstrap)
#
# They are split into separate state files (separate "backend" key per
# versions.tf in each directory) so that the Terraform Destroy workflow,
# which only ever runs against gitops/terraform/infra, has no way to reach
# or delete the GitHub repository itself. See gitops/terraform/README.md
# "Why two states" for the incident that prompted this split.
#
# Each state is ALSO split into a "plan" job and an "apply" job, rather than
# one job that does both. Reason: this repo's "dev" GitHub Environment
# (gitops/terraform/github/main.tf) requires a human reviewer to click
# "Approve and deploy" before any job tagged `environment: dev` runs a
# single step. If plan and apply lived in the same job, the reviewer would
# be asked to approve BEFORE seeing what would actually change — approving
# blind. Splitting them means:
#   - The "plan" job carries no `environment:` and always runs immediately,
#     posting the full plan as a PR comment (or just to the job log on a
#     direct push / workflow_dispatch).
#   - The "apply" job carries `environment: dev` and therefore pauses for
#     reviewer approval — by the time it does, the paired "plan" job has
#     already finished in the same workflow run, so its output is right
#     there for the reviewer to read before approving.
#   - The apply job downloads the EXACT plan file the plan job produced
#     (via upload-artifact/download-artifact) and applies that, so what
#     gets approved is guaranteed to be what gets applied — no replanning,
#     no drift between what was reviewed and what ran.
#
# terraform-infra-apply needs terraform-github-apply purely for ordering —
# on a from-scratch apply we want the repo to exist before flux_bootstrap_git
# tries to push manifests to it. There is no actual Terraform resource
# dependency between the two states. terraform-infra-plan has no such
# dependency (a plan never writes anything) and runs in parallel with the
# github jobs.

on:
  push:
    branches: [main]
    paths:
      - "gitops/terraform/**"
      - "gitops/flux/**"        # Flux manifest changes also re-run apply so bootstrap stays current
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "gitops/terraform/**"
      - "gitops/flux/**"
  workflow_dispatch:
    inputs:
      # Allow a manual run to skip apply (plan-only) if the caller just wants to
      # verify drift without making changes.  Defaults to true so the most common
      # use case — "apply the current state NOW" — requires no extra clicks.
      # Note: apply is still gated on github.ref == 'refs/heads/main'; dispatching
      # from a feature branch will always be plan-only regardless of this input.
      apply:
        description: "Run terraform apply after plan (main branch only)"
        type: boolean
        required: false
        default: true

permissions:
  contents: write       # flux_bootstrap_git pushes Flux manifests to the repo
  pull-requests: write  # Comment plan output on PRs
  id-token: write       # OIDC auth to Azure

jobs:
  # ---------------------------------------------------------------------------
  # GitHub resources — PLAN. No `environment:` gate, so this always runs
  # immediately and its output is visible before the paired apply job below
  # ever prompts a reviewer for approval.
  # ---------------------------------------------------------------------------
  terraform-github-plan:
    name: Terraform Plan (github)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gitops/terraform/github
    env:
      # This module has no azurerm *provider* resources, but its state still
      # lives in Azure Blob Storage (backend "azurerm" in versions.tf), which
      # needs ARM auth to read/write — hence OIDC login is required here too.
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Azure Login (OIDC)
        # Not used by any provider in this module — only so the azurerm
        # backend can authenticate to read/write this module's state blob.
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      # ---------------------------------------------------------------------
      # Static security/compliance scanning — runs against the raw HCL, so it
      # needs no Azure/GitHub auth and can run before `terraform init`.
      #
      # soft_fail / exit-code: '0' below means findings are printed to the job
      # log but never fail the job. This repo's AKS config makes several
      # deliberate dev-tier cost trade-offs (Free SKU, kubenet, no private
      # cluster, no disk encryption set, etc. — see ../../gitops/terraform/README.md
      # "Cost estimate") that checkov/trivy flag as findings but which are not
      # bugs. Flip these to blocking only after adding an explicit skip-list
      # for the known/intentional findings, otherwise every run "fails" on
      # things this project has already decided not to fix.
      # ---------------------------------------------------------------------
      - name: Checkov scan (report-only)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: gitops/terraform/github
          framework: terraform
          soft_fail: true

      - name: Trivy config scan (report-only)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: config
          scan-ref: gitops/terraform/github
          exit-code: "0"

      - name: Terraform Init
        run: terraform init
        env:
          # The GitHub provider needs a token during init to resolve the github
          # registry mirror for the provider download.
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        env:
          # github_owner (non-sensitive) comes from the committed
          # gitops/terraform/github/terraform.tfvars, auto-loaded by Terraform.
          # Only secrets are injected here.
          TF_VAR_github_token:          ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_azure_client_id:       ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_azure_tenant_id:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true

      # Hand the exact plan binary to terraform-github-apply (a different
      # runner) so it applies precisely what was reviewed here — never a
      # freshly recomputed plan.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-github
          path: gitops/terraform/github/tfplan
          retention-days: 1

      # Post plan output as a PR comment so reviewers can see exactly what will change.
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('gitops/terraform/github/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n...[truncated]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌮 Terraform Plan — github\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ---------------------------------------------------------------------------
  # GitHub resources — APPLY. Gated by the "dev" GitHub Environment, which
  # requires reviewer approval (gitops/terraform/github/main.tf). The plan
  # the reviewer needs is already sitting in terraform-github-plan's job log
  # / PR comment by the time this pauses for approval.
  # ---------------------------------------------------------------------------
  terraform-github-apply:
    name: Terraform Apply (github)
    needs: terraform-github-plan
    # Apply on:
    #   - push to main (the normal GitOps flow), OR
    #   - workflow_dispatch from main with the 'apply' input checked (default: true).
    # PR builds and dispatches from non-main branches are always plan-only —
    # this job is skipped entirely for them, so no approval prompt appears.
    # fromJSON() is required because boolean workflow_dispatch inputs arrive
    # as the strings 'true'/'false', not native booleans.
    if: |
      github.ref == 'refs/heads/main' && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && fromJSON(inputs.apply))
      )
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: gitops/terraform/github
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: terraform init
        env:
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

      # Re-downloads the exact plan file terraform-github-plan produced —
      # this is what the reviewer approved, so it's what gets applied.
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-github
          path: gitops/terraform/github

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_github_token:          ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_azure_client_id:       ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_azure_tenant_id:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---------------------------------------------------------------------------
  # Azure infrastructure — PLAN. Runs in parallel with the github jobs above;
  # a plan never writes anything, so it has no ordering dependency on the
  # repo existing yet.
  # ---------------------------------------------------------------------------
  terraform-infra-plan:
    name: Terraform Plan (infra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gitops/terraform/infra
    env:
      # azurerm provider + backend auth via OIDC — no client secret needed.
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      # Report-only — see the matching step in terraform-github-plan above
      # for why these don't fail the job.
      - name: Checkov scan (report-only)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: gitops/terraform/infra
          framework: terraform
          soft_fail: true

      - name: Trivy config scan (report-only)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: config
          scan-ref: gitops/terraform/infra
          exit-code: "0"

      - name: Terraform Init
        run: terraform init
        env:
          # The GitHub provider mirror is still resolved during init even
          # though this module has no github_* resources (flux provider uses
          # plain HTTP git auth, not the github provider).
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        env:
          # Non-sensitive AKS/Flux config (location, environment, node size/count)
          # comes from the committed gitops/terraform/infra/terraform.tfvars,
          # which Terraform auto-loads. Only secrets are injected here.
          TF_VAR_github_token:          ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-infra
          path: gitops/terraform/infra/tfplan
          retention-days: 1

      # Post plan output as a PR comment so reviewers can see exactly what will change.
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('gitops/terraform/infra/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n...[truncated]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌮 Terraform Plan — infra\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ---------------------------------------------------------------------------
  # Azure infrastructure — APPLY. Needs terraform-infra-plan (to inherit its
  # exact plan file) AND terraform-github-apply (ordering only — so a
  # from-scratch apply has a repo for flux_bootstrap_git to push to). Gated
  # by the same "dev" environment as terraform-github-apply, so the reviewer
  # gets one approval prompt per state, each with its plan already visible.
  # ---------------------------------------------------------------------------
  terraform-infra-apply:
    name: Terraform Apply (infra)
    needs: [terraform-infra-plan, terraform-github-apply]
    if: |
      github.ref == 'refs/heads/main' && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && fromJSON(inputs.apply))
      )
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: gitops/terraform/infra
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - uses: actions/checkout@v4
        with:
          # flux_bootstrap_git commits Flux manifests back to main.
          # A token with contents:write is required (GITHUB_TOKEN has that when
          # permissions.contents = write is set above).
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so the flux provider can push cleanly.
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: terraform init
        env:
          GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}

      # Re-downloads the exact plan file terraform-infra-plan produced — this
      # is what the reviewer approved, so it's what gets applied.
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-infra
          path: gitops/terraform/infra

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_github_token:          ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
