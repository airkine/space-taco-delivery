name: Build, Sign & Push Image

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build.yml"  # trigger on workflow changes too, matching the push filter
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to registry"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/space-taco-delivery

permissions:
  contents: read
  packages: write
  id-token: write         # Required for OIDC signing (Cosign keyless)
  security-events: write  # For SARIF uploads

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Test
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Run golangci-lint
        # golangci-lint v1.64.x is built with Go 1.24. It refuses to analyze modules whose
        # `go` directive is newer than its own build version (exit 3). app/go.mod is pinned
        # to go 1.24 to satisfy this constraint while still building the container with
        # golang:1.26-alpine (CVE fixes live in the runtime image, not the go directive)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: app
          version: latest

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/coverage.out

  # ---------------------------------------------------------------------------
  # Build, SBOM, Sign, Push
  # ---------------------------------------------------------------------------
  build:
    name: Build & Publish
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build-main.outputs.digest }}
      image-ref: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Semantic-version tags (matching the GitHub release tag) are added
          # post-build by the `release` job via `docker buildx imagetools create`,
          # once the next version has been computed from Conventional Commits.
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      # PR builds: single-platform, loaded into the local Docker daemon (not pushed)
      # so Trivy can scan it below before anything reaches the registry.
      - name: Build image (PR validation)
        if: github.event_name == 'pull_request'
        id: build-pr
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          platforms: linux/amd64
          load: true
          tags: space-taco-delivery:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          provenance: false
          sbom: false

      - name: Build and push image
        if: github.event_name != 'pull_request'
        id: build-main
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          provenance: true  # Generates SLSA provenance attestation
          sbom: true        # Generates OCI-attached SBOM

      # Scan with Trivy before anything is pushed, signed, or attested.
      # On PRs this scans the locally-loaded image built above; on main it scans the
      # just-pushed image by digest. Either way a fixable CRITICAL/HIGH CVE fails the
      # job before the signing/SBOM/attestation/GitOps steps run.
      # Pin to a specific version tag — @master is a mutable ref that can silently introduce
      # breaking changes or supply-chain risk between runs. Trivy's ecosystem was temporarily
      # compromised in March 2026 (GHSA-69fq-xp46-6x23), which is exactly why @master is dangerous.
      # ignore-unfixed: only fail on CVEs that have an available fix.
      # Without this, any newly-discovered CVE in distroless/debian12 or a Go dep (even one
      # with no upstream patch yet) will break the build with no remediation path.
      # exit-code "1" still blocks on any fixable CRITICAL/HIGH, so the gate remains meaningful.
      # Note: go.mod declares `go 1.24` but the binary is compiled with golang:1.26-alpine —
      # Trivy reads the Go version from the binary, not go.mod, so the CVEs fixed in 1.26
      # (CVE-2026-42504 etc.) are correctly seen as resolved.
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ github.event_name == 'pull_request' && format('space-taco-delivery:pr-{0}', github.sha) || format('{0}/{1}@{2}', env.REGISTRY, env.IMAGE_NAME, steps.build-main.outputs.digest) }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF
        # always() so results land in the Security tab / PR annotations even when Trivy
        # found CVEs and failed the step above. CodeQL action v4 required — v3 deprecated Dec 2026.
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      # Install Cosign for keyless signing
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      # Sign the image with keyless OIDC signing (Sigstore / Fulcio + Rekor).
      # COSIGN_EXPERIMENTAL is no longer needed in Cosign v2+; keyless is the default.
      - name: Sign container image (keyless)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-main.outputs.digest }}

      # Generate a standalone SBOM with Syft and attach to image
      - name: Generate SBOM with Syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-main.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      # Create a verifiable attestation that cryptographically links the SBOM to the image digest.
      # cosign attest is the modern replacement for the deprecated `cosign attach sbom` —
      # attestations are discoverable via `cosign verify-attestation` and stored in Rekor.
      - name: Attest SBOM to image
        if: github.event_name != 'pull_request'
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-main.outputs.digest }}

  # ---------------------------------------------------------------------------
  # Determine next version (Conventional Commits + SemVer)
  # ---------------------------------------------------------------------------
  version:
    name: Determine Next Version
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history & tags needed to find the previous release

      # Inspects commit messages since the last `vX.Y.Z` tag and computes the next
      # SemVer tag: `fix:` -> patch, `feat:` -> minor, `BREAKING CHANGE`/`!` -> major.
      # dry_run: the tag itself is created by the GitHub release below, not here.
      - name: Compute next version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          dry_run: true

  # ---------------------------------------------------------------------------
  # Tag & Release (main branch only)
  # ---------------------------------------------------------------------------
  release:
    name: Tag & Release
    needs: [build, version]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to create the tag & release
      packages: write  # to add the version tag to the image in GHCR
    steps:
      # Creating a release with a tag_name that doesn't exist yet also creates the
      # git tag, pointed at target_commitish. generate_release_notes summarizes the
      # PRs merged since the previous release.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            **Image**
            ```
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
            ```

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-tag the already-built, signed & attested multi-arch image (by digest) with
      # the release version. No rebuild — just an additional manifest reference, so
      # the image tag matches the git tag/release exactly. Cosign signatures and SBOM
      # attestations are keyed to the digest and remain valid under the new tag.
      - name: Tag image with release version
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_tag }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
