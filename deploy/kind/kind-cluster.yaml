---
# Kind cluster configuration for Space Taco local development
# Usage: kind create cluster --name space-taco --config deploy/kind/kind-cluster.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: space-taco

nodes:
  - role: control-plane
    # Pin to K8s 1.30 — tested stable on Docker Desktop WSL2 (kernel 5.15.x).
    # K8s 1.35 (Kind's current default) has cgroup requirements not yet met by
    # the Microsoft WSL2 5.15 kernel; bump this only after upgrading Docker Desktop.
    image: kindest/node:v1.30.0
    # Port mappings for local ingress access
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
      - |
        # Use cgroupfs driver instead of systemd.
        # Docker Desktop on Windows does not fully expose systemd cgroup delegation
        # inside Kind containers, which causes the kubelet to fail with
        # "required cgroups disabled" on 127.0.0.1:10248.  cgroupfs bypasses that.
        kind: KubeletConfiguration
        cgroupDriver: cgroupfs
      - |
        # Enable ValidatingAdmissionPolicy for Kyverno (GA in K8s 1.30, beta 1.28-1.29).
        # Scoped to the API server only — does not affect the kubelet.
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            feature-gates: "ValidatingAdmissionPolicy=true"
  - role: worker
    image: kindest/node:v1.30.0
    labels:
      workload: app
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs: {}
      - |
        kind: KubeletConfiguration
        cgroupDriver: cgroupfs
  - role: worker
    image: kindest/node:v1.30.0
    labels:
      workload: app
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs: {}
      - |
        kind: KubeletConfiguration
        cgroupDriver: cgroupfs

# containerd must also use cgroupfs so the runc shim and the kubelet agree on
# the cgroup driver.  Mismatch between the two is the other common cause of the
# kubelet 10248 healthz failure on Windows/WSL2.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
      [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
        SystemdCgroup = false

# Networking — explicit IPv4-only to avoid WSL2 IPv6 binding issues on Windows
networking:
  ipFamily: ipv4
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
